[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc-version = "0.8.24"
evm-version = "cancun"
optimizer = true
optimizer-runs = 200
via-ir = true
gas_reports = ["*"]

[etherscan]
polygon = { key = "${POLYGONSCAN_TOKEN}", url = "https://api.polygonscan.com/api" }
polygon-amoy = { key = "${POLYGONSCAN_TOKEN}", url = "https://api-amoy.polygonscan.com/api" }
